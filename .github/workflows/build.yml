name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # 允许手动触发

jobs:
  # Debug APK 构建
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
      GRADLE_OPTS: -Dfile.encoding=UTF-8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 1
          compression-level: 9

  # Release APK 构建（用于创建 GitHub Release）
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
      GRADLE_OPTS: -Dfile.encoding=UTF-8
    permissions:
      contents: write
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Cache Gradle & npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.npm
            android/.gradle
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Remove Aliyun mirrors for CI
        run: |
          sed -i '/maven.aliyun.com/d' android/build.gradle

      - name: Convert Java encoding
        run: |
          # 将 GBK 编码的 Java 文件转换为 UTF-8
          find android/app/src/main/java -name "*.java" -type f -exec sh -c '
            file="$1"
            # 尝试从 GBK 转换到 UTF-8
            if iconv -f GBK -t UTF-8 "$file" > "$file.tmp" 2>/dev/null && [ -s "$file.tmp" ]; then
              # 验证转换后的文件包含有效的 Java 代码
              if head -n 5 "$file.tmp" | grep -qE "(package|import|public|class|//)" 2>/dev/null; then
                mv "$file.tmp" "$file"
                echo "✓ Converted $file from GBK to UTF-8"
              else
                rm -f "$file.tmp"
              fi
            else
              rm -f "$file.tmp" 2>/dev/null || true
            fi
          ' _ {} \;

      - name: Build Packages
        shell: bash
        run: |
          cd android
          # 如果没有签名配置，创建临时的 keystore
          if [ ! -f "keystore.properties" ]; then
            echo "创建临时签名配置..."
            # 总是创建新的临时 keystore，避免使用仓库中可能密码不匹配的 debug.keystore
            rm -f app/ci.keystore
            keytool -genkeypair -v -storetype PKCS12 -keystore app/ci.keystore -alias ci-key -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
            
            # 使用 build.gradle 中识别的键名 (MYAPP_UPLOAD_...)
            echo "MYAPP_UPLOAD_STORE_FILE=ci.keystore" > keystore.properties
            echo "MYAPP_UPLOAD_KEY_ALIAS=ci-key" >> keystore.properties
            echo "MYAPP_UPLOAD_STORE_PASSWORD=android" >> keystore.properties
            echo "MYAPP_UPLOAD_KEY_PASSWORD=android" >> keystore.properties
          fi
          # 检查是否有有效的签名 secrets
          chmod +x ./gradlew
          # 读取 secrets（如果未设置则为空字符串）
          KEYSTORE_FILE="${{ secrets.MYAPP_UPLOAD_STORE_FILE }}"
          KEYSTORE_BASE64="${{ secrets.MYAPP_KEYSTORE_BASE64 }}"
          # 严格验证：确保文件名和 base64 内容都有效
          # 检查文件名：非空、长度>0、不包含路径分隔符
          # 检查 base64：非空、长度>10（至少包含一些内容）
          if [ -n "${KEYSTORE_FILE}" ] && \
             [ "${#KEYSTORE_FILE}" -gt 0 ] && \
             [ "${KEYSTORE_FILE}" != "/" ] && \
             [ "${KEYSTORE_FILE}" != "app/" ] && \
             [ -n "${KEYSTORE_BASE64}" ] && \
             [ "${#KEYSTORE_BASE64}" -gt 10 ]; then
            echo "使用提供的签名配置..."
            TARGET_FILE="app/${KEYSTORE_FILE}"
            echo "${KEYSTORE_BASE64}" | base64 --decode > "${TARGET_FILE}"
            ./gradlew assembleRelease \
              -PMYAPP_UPLOAD_STORE_FILE="${KEYSTORE_FILE}" \
              -PMYAPP_UPLOAD_KEY_ALIAS="${{ secrets.MYAPP_UPLOAD_KEY_ALIAS }}" \
              -PMYAPP_UPLOAD_STORE_PASSWORD="${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}" \
              -PMYAPP_UPLOAD_KEY_PASSWORD="${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}"
            rm -f "${TARGET_FILE}"
          else
            echo "使用临时签名配置（secrets 未配置或无效）..."
            ./gradlew assembleRelease
          fi

      - name: Get package version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Create git tag
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: pkgdeps/git-tag-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          version: ${{ env.PACKAGE_VERSION }}
          git_commit_sha: ${{ github.sha }}
          git_tag_prefix: 'v'

      - name: Generate file MD5
        run: |
          cd android/app/build/outputs/apk/release
          md5sum *.apk

      - name: Get package name
        run: echo "PACKAGE_NAME=$(node -p "require('./package.json').name")" >> $GITHUB_ENV

      - name: Upload Artifact
        if: github.event_name == 'push'
        uses: ./.github/actions/upload-artifact
        env:
          PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}

  # 创建 GitHub Release
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-release]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate release body
        run: |
          awk 'BEGIN{RS="---"}{if(NR==1)print $0}' ./publish/changeLog.md > RELEASE_NOTES.md
          echo -e '\n### File MD5\n```' >> RELEASE_NOTES.md
          cd artifacts
          md5sum *.apk >> ../RELEASE_NOTES.md
          cd ..
          echo -e '```\n' >> RELEASE_NOTES.md
          echo -e '\n[软件安装包说明](https://lyswhut.github.io/lx-music-doc/download#%E8%BD%AF%E4%BB%B6%E5%AE%89%E8%A3%85%E5%8C%85%E8%AF%B4%E6%98%8E)\n' >> RELEASE_NOTES.md

      - name: Get package version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Get package name
        run: echo "PACKAGE_NAME=$(node -p "require('./package.json').name")" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          prerelease: false
          draft: false
          tag_name: v${{ env.PACKAGE_VERSION }}
          files: |
            artifacts/${{ env.PACKAGE_NAME }}-v${{ env.PACKAGE_VERSION }}-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

