name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          # 确保 Git 检出时使用 UTF-8 编码
          GIT_LFS_SKIP_SMUDGE: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          # 对应 26.1.10909125 的"r26d"写法，nttld/setup-ndk 只认 rXX 格式
          # nttld/setup-ndk 会自动设置 ANDROID_NDK_HOME 环境变量
          ndk-version: 'r26d'

      - name: 配置 Git 环境编码
        run: |
          git config --global core.quotepath false
          git config --global i18n.commitencoding utf-8
          git config --global i18n.logoutputencoding utf-8

      - name: 安装 JS 依赖
        run: npm ci

      - name: 清理构建缓存
        run: |
          rm -rf ~/.gradle/caches/
          cd android
          chmod +x gradlew  # 确保 gradlew 有执行权限
          ./gradlew clean
          rm -rf .cxx app/.cxx

      - name: 构建 Android Release
        env:
          # 强制使用 UTF-8 编码，解决中文注释编译错误
          # ANDROID_NDK_HOME 已由 nttld/setup-ndk 自动设置
          JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: |
          cd android
          chmod +x gradlew  # 确保 gradlew 有执行权限
          ./gradlew assembleRelease --refresh-dependencies


