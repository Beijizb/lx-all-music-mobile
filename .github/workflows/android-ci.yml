name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置 Gradle 缓存
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          # 对应 26.1.10909125 的"r26d"写法，nttld/setup-ndk 只认 rXX 格式
          # nttld/setup-ndk 会自动设置 ANDROID_NDK_HOME 环境变量
          ndk-version: 'r26d'

      - name: 配置 Git 环境编码
        run: |
          git config --global core.quotepath false
          git config --global i18n.logoutputencoding utf-8

      - name: 安装 JS 依赖
        run: npm ci

      - name: 转换 Java 文件编码为 UTF-8
        run: |
          # 将 GBK 编码的 Java 文件转换为 UTF-8
          # 注意：这是临时方案，建议在本地将所有 Java 文件转换为 UTF-8 后提交
          find android/app/src/main/java -name "*.java" -type f -exec sh -c '
            file="$1"
            # 尝试从 GBK 转换到 UTF-8
            if iconv -f GBK -t UTF-8 "$file" > "$file.tmp" 2>/dev/null && [ -s "$file.tmp" ]; then
              # 验证转换后的文件包含有效的 Java 代码
              if head -n 5 "$file.tmp" | grep -qE "(package|import|public|class|//)" 2>/dev/null; then
                mv "$file.tmp" "$file"
                echo "✓ Converted $file from GBK to UTF-8"
              else
                rm -f "$file.tmp"
              fi
            else
              rm -f "$file.tmp" 2>/dev/null || true
            fi
          ' _ {} \;

      - name: 清理构建缓存
        run: |
          cd android
          chmod +x gradlew  # 确保 gradlew 有执行权限
          ./gradlew clean
          rm -rf .cxx app/.cxx

      - name: 构建 Android Release
        env:
          # 强制使用 UTF-8 编码，解决中文注释编译错误
          JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: |
          cd android
          ./gradlew assembleRelease


