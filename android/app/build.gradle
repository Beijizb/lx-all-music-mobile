/**
 * ✅ 测试包只要一个 debug APK，不拆 ABI，避免 CI 变量和产物混乱
 */
def enableSeparateBuildPerCPUArchitecture = false

/**
 * ✅ 测试包不需要 Proguard/minify，避免 release 相关坑
 */
def enableProguardInReleaseBuilds = false

def jscFlavor = 'org.webkit:android-jsc:+'

def reactNativeArchitectures() {
    def value = project.getProperties().get("reactNativeArchitectures")
    return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

// Define hermesEnabled property
def hermesEnabled = project.hasProperty('hermesEnabled') ? project.getProperty('hermesEnabled') : true

/**
 * ✅ 版本号读取（CI 保底不炸）
 * - 用 rootDir.parentFile 精准定位项目根目录 package.json
 * - versionCode 强转 int + 默认值
 */
def getNpmPackageJson() {
    def inputFile = new File(rootDir.parentFile, "package.json")
    def packageJson = new JsonSlurper().parseText(inputFile.text)
    return packageJson
}

def npmPackageJson = getNpmPackageJson()

def verCodeRaw = npmPackageJson["versionCode"] ?: 1
def verCode = Integer.parseInt(verCodeRaw.toString())
def verName = npmPackageJson["version"] ?: "0.0.0"
def applicationName = npmPackageJson["name"] ?: "app"

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.lxb.music.mobile"
    defaultConfig {
        applicationId "com.lxb.music.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode verCode
        versionName verName
    }

    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            universalApk true
            if (enableSeparateBuildPerCPUArchitecture) {
                include(*reactNativeArchitectures())
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            } else {
                def keystorePropertiesFile = rootProject.file("keystore.properties")
                def keystoreProperties = new Properties()
                if (keystorePropertiesFile.exists()) {
                    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
                }
                if (keystoreProperties.containsKey('MYAPP_UPLOAD_STORE_FILE')) {
                    storeFile file(keystoreProperties['MYAPP_UPLOAD_STORE_FILE'])
                    storePassword keystoreProperties['MYAPP_UPLOAD_STORE_PASSWORD']
                    keyAlias keystoreProperties['MYAPP_UPLOAD_KEY_ALIAS']
                    keyPassword keystoreProperties['MYAPP_UPLOAD_KEY_PASSWORD']
                } else {
                    // Fallback to debug keystore if no release keys are found
                    storeFile file('debug.keystore')
                    storePassword 'android'
                    keyAlias 'androiddebugkey'
                    keyPassword 'android'
                }
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // 强制使用 UTF-8 编码编译 Java 文件
    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".dev"
        }
        release {
            /**
             * ✅ 只为测试 debug 出包：release 不启用混淆，不强制 release 签名
             * 这样就算没 keystore 也不会让 CI 挂。
             */
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            def versionCodes = ["armeabi-v7a": 1, "x86": 2, "arm64-v8a": 3, "x86_64": 4]
            def abi = output.getFilter(OutputFile.ABI)
            if (abi == null) {
                output.outputFileName =
                        "${applicationName}-v${defaultConfig.versionName}-universal.apk"
            } else {
                output.versionCodeOverride =
                        defaultConfig.versionCode * 1000 + versionCodes.get(abi)
                output.outputFileName =
                        "${applicationName}-v${defaultConfig.versionName}-${abi}.apk"
            }
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:flipper-integration")
    implementation 'wang.harlon.quickjs:wrapper-android:2.4.0'

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle");
applyNativeModulesAppBuildGradle(project)
